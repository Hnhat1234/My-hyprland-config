# Clipboard integration
#
# Ctrl+C copies selected text when a selection exists, otherwise it keeps the
# normal terminal interrupt behavior. Ctrl+V pastes from the Wayland clipboard.
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

# Keep Kitty's standard terminal clipboard shortcuts available too.
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map shift+insert paste_from_clipboard


# -------------------------------
# Garuda-style visual setup
# -------------------------------

# Font (fallback-friendly)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Window feel
background_opacity 0.90
dynamic_background_opacity yes
background_blur 24
window_padding_width 12
placement_strategy center
remember_window_size  yes
initial_window_width  120c
initial_window_height 34c
hide_window_decorations titlebar-only
confirm_os_window_close 0

# Layout + split styling (Garuda-like framed panes)
enabled_layouts tall,grid,stack,splits
draw_minimal_borders yes
window_border_width 2pt
active_border_color #89b4fa
inactive_border_color #313244
bell_border_color #f9e2af

# Cursor
cursor_shape beam
cursor_blink_interval 0.45
cursor_stop_blinking_after 0
cursor #ff4df0

# Selection
selection_foreground #11111b
selection_background #f5c2e7

# Tab bar styling
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_bar_align left
tab_separator "  "
tab_title_template "{index}: {title}"
active_tab_title_template "{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal
active_tab_background #cba6f7
active_tab_foreground #1e1e2e
inactive_tab_background #313244
inactive_tab_foreground #a6adc8
tab_bar_background #181825
tab_bar_margin_width 6

# Bell
enable_audio_bell no
visual_bell_duration 0.10
window_alert_on_bell yes

# Garuda-like neon palette
foreground            #cdd6f4
background            #0b0b12

color0                #1e1e2e
color1                #f38ba8
color2                #a6e3a1
color3                #f9e2af
color4                #89b4fa
color5                #f5c2e7
color6                #94e2d5
color7                #bac2de
color8                #585b70
color9                #f38ba8
color10               #a6e3a1
color11               #f9e2af
color12               #89b4fa
color13               #ff79c6
color14               #94e2d5
color15               #ffffff
